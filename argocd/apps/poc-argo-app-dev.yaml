apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: poc-argo-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: poc
  source:
    repoURL: https://github.com/victor-ln/gitops-manifests.git
    targetRevision: HEAD
    path: projects/poc/argo-app/overlays/dev
  destination:
    name: poc-dev
    namespace: poc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
