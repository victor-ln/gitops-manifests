apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: poc-argo-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: poc
  source:
    repoURL: https://github.com/victor-ln/gitops-manifests.git
    targetRevision: HEAD
    path: projects/poc/argo-app/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: poc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
