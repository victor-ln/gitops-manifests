apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# O ArgoCD cria o namespace via CreateNamespace=true — não declarar Namespace aqui.
namespace: argocd-app

resources:
  - deployment.yaml
  - service.yaml

# Ponto que o CI do argocd-app bumpa: `kustomize edit set image vlimanu/argocd-app=...:vX`
images:
  - name: vlimanu/argocd-app
    newTag: "0.1.0"
